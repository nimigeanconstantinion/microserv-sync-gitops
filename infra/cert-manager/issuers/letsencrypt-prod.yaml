apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: constantin.nimigean@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # HTTP-01 challenge prin NGINX Ingress
      # Necesită port 80 deschis pe router → server (DNS public funcțional)
      - http01:
          ingress:
            class: nginx
