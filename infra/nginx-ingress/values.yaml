# NGINX Ingress Controller — values pentru cluster
#
# Pentru setup cu Cloudflare Tunnel: type=ClusterIP (cloudflared intern conectează aici)
# Pentru setup cu port-forward + DDNS: type=LoadBalancer (K3s mapează automat 80/443)

controller:
  # Schimbă aici în funcție de setup-ul tău:
  # - ClusterIP: dacă folosești Cloudflare Tunnel sau alt tunnel intern
  # - LoadBalancer: dacă folosești port-forward 80/443 din router
  service:
    type: LoadBalancer

  replicaCount: 1

  # Headers necesare când suntem în spatele unui proxy/tunnel
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"

  # Resurse modeste pentru home lab
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # IngressClass — toate Ingress-urile cu className=nginx vor fi gestionate aici
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
