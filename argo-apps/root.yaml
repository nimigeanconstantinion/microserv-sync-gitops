apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Source: argo-apps/ folder din acest repo
  source:
    repoURL: https://github.com/nimigeanconstantinion/microserv-sync-gitops.git
    targetRevision: master
    path: argo-apps
    directory:
      recurse: false   # nu intra în sub-directoare

  # Destinație: clusterul curent, namespace argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # Auto-sync: orice fișier nou în argo-apps/ devine automat o Application
  syncPolicy:
    automated:
      prune: true       # șterge resurse care nu mai sunt în git
      selfHeal: true    # corectează drift dacă cineva modifică direct în cluster
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
