apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Single-source: CR-uri Grafana (instanță + datasource + dashboards + sealed secret + ingress)
  source:
    repoURL: https://github.com/nimigeanconstantinion/microserv-sync-gitops.git
    targetRevision: master
    path: infra/grafana
    directory:
      recurse: true   # include subfolderele secrets/ și dashboards/

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
